name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Run tests (pytest)
        run: pytest --tb=short -q
        env:
          # Tests use an in-memory SQLite DB via get_db override; this value is
          # only needed to satisfy pydantic-settings at import time.
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          OPENAI_API_KEY: "test-key"

  # ── Backend integration ──────────────────────────────────────────────────────
  # Separate job: runs the real ChatWorkflow on a real (ephemeral) Temporal test
  # server via `tests/integration/`, only the LLM calls are mocked. Slower than
  # the unit suite above and needs network access on first run to fetch the
  # Temporal test-server binary, so it's kept out of the default `pytest` run
  # (see backend/pytest.ini) and given its own job/cache here.
  backend-integration:
    name: Backend — integration tests (real Temporal workflow)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Temporal test-server binary
        # temporalio.testing downloads the dev-server CLI to a versioned
        # subdirectory of the OS temp dir (e.g. /tmp/temporal-test-server-sdk-python-1.30.0)
        # and skips re-downloading while that exists, so caching it avoids a
        # network fetch on every run.
        uses: actions/cache@v4
        with:
          path: /tmp/temporal-test-server-sdk-python-*
          key: temporalio-test-server-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}

      - name: Run integration tests (pytest -m integration)
        run: pytest --tb=short -q -m integration tests/integration
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          OPENAI_API_KEY: "test-key"

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — type check, build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      - name: Run tests (vitest)
        run: npm test

  # ── Frontend e2e ─────────────────────────────────────────────────────────────
  # Separate job: Playwright drives a real browser against a production build
  # (`vite preview`), with every /api/** call mocked in-browser (see
  # frontend/e2e/support/mockApi.ts) — no backend, database, or LLM involved.
  frontend-e2e:
    name: Frontend — e2e (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build (tsc + vite)
        run: npm run build

      - name: Run e2e tests (playwright)
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
