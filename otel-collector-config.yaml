receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  batch:
    timeout: 5s
    send_batch_size: 1000

  # Attach environment and version to every metric/span so Grafana can filter
  resource:
    attributes:
      - key: deployment.environment
        from_attribute: deployment.environment
        action: upsert

exporters:
  # Prometheus scrape endpoint — Prometheus pulls from :8889
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: ""            # metric names already include rag.* namespace
    send_timestamps: true
    metric_expiration: 30m   # keep metrics visible for 30 min after last emit
    enable_open_metrics: true
    add_metric_suffixes: false

  # Forward traces to Grafana Tempo via OTLP
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Structured log output — useful during development
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
