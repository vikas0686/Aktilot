apiVersion: 1

providers:
  - name: aktilot
    orgId: 1
    folder: Aktilot RAG
    folderUid: aktilot-rag
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
