[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = .
filterwarnings = ignore::DeprecationWarning
# Integration tests are slower (real ephemeral Temporal server per test) and
# need network access on first run to fetch the test-server binary, so they're
# excluded by default. Run them explicitly with: pytest -m integration
addopts = -m "not integration"
markers =
    integration: full-stack Temporal workflow tests against a real ephemeral test server (slower; excluded from the default run, see tests/integration/).
