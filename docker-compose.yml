services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    restart: on-failure

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/docai
      - TEMPORAL_ADDRESS=temporal:7233
      - UPLOAD_DIR=uploads
      - CHROMA_DIR=chroma_data
      - CONTEXT_DIR=context
    volumes:
      - uploads_data:/app/uploads
      - chroma_data:/app/chroma_data
      - context_data:/app/context
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: on-failure

  worker:
    build: ./backend
    command: python -m temporal.worker
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/docai
      - TEMPORAL_ADDRESS=temporal:7233
      - UPLOAD_DIR=uploads
      - CHROMA_DIR=chroma_data
      - CONTEXT_DIR=context
    volumes:
      - uploads_data:/app/uploads
      - chroma_data:/app/chroma_data
      - context_data:/app/context
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
  chroma_data:
  context_data:
