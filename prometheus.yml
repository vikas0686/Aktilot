global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
    # Exemplar support: enable exemplar scraping so Prometheus stores
    # trace IDs embedded in histogram observations, enabling metric→trace links in Grafana
    scrape_protocols:
      - OpenMetricsText1.0.0
      - OpenMetricsText0.0.1
      - PrometheusText0.0.4
